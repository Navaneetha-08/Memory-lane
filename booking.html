<!DOCTYPE html>
<html>
<head>
<title>Booking ✈️</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5 pt-5">
<h2 class="text-center">Book Your Trip</h2>

<form id="bookingForm" class="pastel-form">
<input type="text" class="form-control mb-3" placeholder="👤 Name" required>
<input type="email" class="form-control mb-3" placeholder="📧 Email" required>
<select class="form-select mb-3">
<option>Maldives</option>
<option>Japan</option>
<option>Paris</option>
<option>America</option>
<option>China</option>
<option>Korea</option>
<option>Europe</option>
<option>Australia</option>
<option>Singapore</option>
<option>Bali</option>
<option>Vietnam</option>
<option>Thailand</option>

</select>
<button class="btn btn-pastel w-100">Confirm Booking 🚀</button>
</form>

</div>
<script src="script.js"></script>
</body>
</html>
