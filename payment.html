<!DOCTYPE html>
<html>
<head>
<title>Secure Payment 🌸</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top pastel-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">ENJOYABLE TRIPS</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="packages.html">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="payment.html">Payment</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

<div class="container mt-5 pt-5">
    <h2 class="text-center mb-4">🔒 Secure Payment Gateway</h2>

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="payment-box">

                <!-- Payment Method Tabs -->
                <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#card">💳 Card</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#upi">📱 UPI</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#netbanking">🏦 Net Banking</button>
                    </li>
                </ul>

                <div class="tab-content">

                    <!-- CARD PAYMENT -->
                    <div class="tab-pane fade show active" id="card">
                        <form id="paymentForm">
                            <input type="text" class="form-control mb-3" placeholder="Card Holder Name" required>
                            <input type="text" class="form-control mb-3" placeholder="Card Number" required>
                            <div class="row">
                                <div class="col">
                                    <input type="text" class="form-control mb-3" placeholder="MM/YY" required>
                                </div>
                                <div class="col">
                                    <input type="text" class="form-control mb-3" placeholder="CVV" required>
                                </div>
                            </div>
                            <button class="btn btn-pay w-100">Pay</button>
                        </form>
                    </div>

                    <!-- UPI PAYMENT -->
                    <div class="tab-pane fade" id="upi">
                        <form class="payment-alt">
                            <input type="text" class="form-control mb-3" placeholder="Enter UPI ID (example@upi)" required>
                            <button class="btn btn-pay w-100">Pay via UPI</button>
                        </form>
                    </div>

                    <!-- NET BANKING -->
                    <div class="tab-pane fade" id="netbanking">
                        <form class="payment-alt">
                            <select class="form-select mb-3">
                                <option>Select Bank</option>
                                <option>SBI</option>
                                <option>HDFC</option>
                                <option>ICICI</option>
                                <option>Axis Bank</option>
                            </select>
                            <button class="btn btn-pay w-100">Proceed to Bank</button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <h3>🎉 Payment Successful!</h3>
      <p>Your booking is confirmed. Have a wonderful journey ✈️</p>
      <a href="index.html" class="btn btn-pastel mt-3">Go to Home</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
